<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>ELIZA 日本語チャット</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP"; padding: 1rem; }
    #chat { border: 1px solid #ddd; padding: 1rem; height: 60vh; overflow-y: auto; background: #fafafa; }
    .msg { margin: 0.5rem 0; }
    .msg.user { text-align: right; color: #111; }
    .msg.bot { text-align: left; color: #004; }
    .meta { font-size: 0.8rem; color: #666; }
    #controls { margin-top: 0.5rem; display:flex; gap:.5rem; }
    input[type="text"] { flex: 1; padding: 0.5rem; font-size: 1rem; }
    button { padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h1>ELIZA 日本語チャット</h1>
  <p>日本語対応の簡易 ELIZA。簡易ルールで応答します。</p>
  <div id="chat" aria-live="polite"></div>

  <div id="controls">
    <input id="input" type="text" placeholder="話しかけてください..." />
    <button id="send">送信</button>
    <button id="showLogs">ログ表示</button>
    <button id="clear">クリア</button>
  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
